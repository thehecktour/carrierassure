version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: carrierassure_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - sqlite_data:/app/data
    environment:
      DEBUG: "True"
      SECRET_KEY: "dev-secret-key-troque-em-producao"
      CORS_ALLOW_ALL_ORIGINS: "True"
      DATABASE_URL: sqlite:////app/data/db.sqlite3
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: carrierassure_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  sqlite_data: