version: "3.9"

services:

  db:
    image: mongo:7.0
    container_name: carrierassure_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: carrierassure_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      MONGO_URI: mongodb://db:27017
      MONGO_DB_NAME: carrier_assure
      DEBUG: "True"
      SECRET_KEY: "dev-secret-key-troque-em-producao"
      CORS_ALLOW_ALL_ORIGINS: "True"
    depends_on:
      db:
        condition: service_healthy

  # frontend:
